[project]
name = "bible-to-qdrant"
version = "0.1.0"
description = "Load Polish Bible (New Testament) verses into Qdrant with embeddings"
requires-python = ">=3.12"
dependencies = [
    "core",
    "httpx>=0.27",
    "fastembed>=0.6",
    "voyageai>=0.3",
]

[project.scripts]
bible-to-qdrant = "bible_to_qdrant.__main__:main"
bible-to-qdrant-voyage = "bible_to_qdrant.__main__:main_voyage"
bible-to-qdrant-chapters-voyage = "bible_to_qdrant.__main__:main_chapters_voyage"

[tool.uv.sources]
core = { workspace = true }

[dependency-groups]
dev = ["pytest>=8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bible_to_qdrant"]
