[project]
name = "ts-type-refiner"
version = "0.1.0"
description = "Train an encoder-decoder model to improve TypeScript types"
requires-python = ">=3.12"
dependencies = [
    "tokenizers>=0.19",
]

[dependency-groups]
dev = ["torch>=2.3.1"]

[project.scripts]
refiner-train = "ts_type_refiner.train:main"
refiner-infer = "ts_type_refiner.infer:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ts_type_refiner"]
