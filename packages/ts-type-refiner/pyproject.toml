[project]
name = "ts-type-refiner"
version = "0.1.0"
description = "Train an encoder-decoder model to improve TypeScript types"
requires-python = ">=3.12"
dependencies = [
    "core",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ts_type_refiner"]
