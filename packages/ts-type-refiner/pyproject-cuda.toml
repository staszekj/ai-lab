[project]
name = "ts-type-refiner"
version = "0.1.0"
description = "Train an encoder-decoder model to improve TypeScript types"
requires-python = ">=3.12"
dependencies = [
    "tokenizers>=0.19",
]

[dependency-groups]
dev = ["torch==2.5.1+cu121"]

[tool.uv.sources]
torch = [{ index = "pytorch-cu121" }]

[[tool.uv.index]]
name = "pytorch-cu121"
url = "https://download.pytorch.org/whl/cu121"
explicit = true

[project.scripts]
refiner-train = "ts_type_refiner.training.train:main"
refiner-infer = "ts_type_refiner.inference.infer:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ts_type_refiner"]
