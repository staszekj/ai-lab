[project]
name = "core"
version = "0.1.0"
description = "Shared utilities for ai-lab"
requires-python = ">=3.12"
dependencies = [
    "qdrant-client>=1.17.1",
]

[project.scripts]
test = "pytest:main"

[dependency-groups]
dev = ["pytest>=8.0", "torch>=2.3.1"]

[[tool.uv.index]]
name = "pytorch-cu121"
url = "https://download.pytorch.org/whl/cu121"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu121" }

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/core"]
