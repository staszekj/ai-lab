[project]
name = "core"
version = "0.1.0"
description = "Shared utilities for ai-lab"
requires-python = ">=3.12"
dependencies = [
    "qdrant-client>=1.17.1",
]

[project.scripts]
test                         = "pytest:main"
presentation-mini-gpt        = "core._scripts:presentation_mini_gpt"
presentation-transformer-block = "core._scripts:presentation_transformer_block"
presentation-decoder-block   = "core._scripts:presentation_decoder_block"
presentation-encoder-decoder = "core._scripts:presentation_encoder_decoder"
presentation-loss-backward   = "core._scripts:presentation_loss_backward"
manual-mini-gpt              = "core._scripts:manual_mini_gpt"
manual-transformer-block     = "core._scripts:manual_transformer_block"
manual-decoder-block         = "core._scripts:manual_decoder_block"
manual-encoder-decoder       = "core._scripts:manual_encoder_decoder"
manual-loss-backward         = "core._scripts:manual_loss_backward"

[dependency-groups]
dev = ["pytest>=8.0", "torch>=2.3.1"]

[[tool.uv.index]]
name = "pytorch-cu121"
url = "https://download.pytorch.org/whl/cu121"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu121" }

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/core"]
